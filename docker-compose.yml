version: "3.8"
services:
  api:
    build: ./apps/api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    volumes:
      - ./apps/api:/app
      - ./data:/data
    working_dir: /app
    env_file: .env
    environment:
      - DB_PATH=/data/knowledge.db

  web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apps/web/public:/usr/share/nginx/html
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro