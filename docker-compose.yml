version: "3.8"
services:
  api:
    build: ./apps/api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./data:/data
    working_dir: /app
    env_file: .env
    environment:
      - DB_PATH=/data/knowledge.db

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./apps/web:/usr/share/nginx/html