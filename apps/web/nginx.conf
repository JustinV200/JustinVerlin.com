server {
    listen 80;
    server_name justinverlin.com www.justinverlin.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name justinverlin.com www.justinverlin.com;

    ssl_certificate     /etc/letsencrypt/live/justinverlin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justinverlin.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location = /chat {
        proxy_pass http://api:8000/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /keystroke {
        proxy_pass http://api:8000/keystroke;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /keystroke/status {
        proxy_pass http://api:8000/keystroke/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
