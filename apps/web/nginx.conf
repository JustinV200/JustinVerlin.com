server {
    listen 80;
    server_name justinverlin.com www.justinverlin.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name justinverlin.com www.justinverlin.com;

    ssl_certificate     /etc/letsencrypt/live/justinverlin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justinverlin.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    server_tokens off;

    # Use Docker's embedded DNS so 'api' is re-resolved at runtime,
    # not cached at nginx worker startup (prevents stale-IP 502s after redeploy).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /api/chat {
        set $api_upstream "http://api:8000";
        proxy_pass $api_upstream/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/keystroke {
        set $api_upstream "http://api:8000";
        proxy_pass $api_upstream/keystroke;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/keystroke/status {
        set $api_upstream "http://api:8000";
        proxy_pass $api_upstream/keystroke/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
