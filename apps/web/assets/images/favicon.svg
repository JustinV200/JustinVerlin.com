<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<defs>
		<linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#3b6bd9"/>
			<stop offset="100%" stop-color="#4a5bc4"/>
		</linearGradient>
		<radialGradient id="glow" cx="50%" cy="50%" r="50%">
			<stop offset="0%" stop-color="#3b6bd9" stop-opacity="0.28"/>
			<stop offset="60%" stop-color="#3b6bd9" stop-opacity="0.08"/>
			<stop offset="100%" stop-color="#3b6bd9" stop-opacity="0"/>
		</radialGradient>
		<filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
			<feGaussianBlur stdDeviation="1.2"/>
		</filter>
	</defs>

	<!-- Rounded dark tile -->
	<rect width="64" height="64" rx="12" fill="#0b0d12"/>

	<!-- Glowing blue halo behind the text (pulses when rendered live) -->
	<circle cx="32" cy="32" r="26" fill="url(#glow)">
		<animate attributeName="r" values="24;30;24" dur="3.2s" repeatCount="indefinite"/>
		<animate attributeName="opacity" values="0.75;1;0.75" dur="3.2s" repeatCount="indefinite"/>
	</circle>

	<!-- Soft glow copy of the letters -->
	<text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle"
		font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
		font-weight="700" font-size="32" fill="#3b6bd9" letter-spacing="-1"
		filter="url(#soft)" opacity="0.35">JV</text>

	<!-- Crisp gradient letters on top -->
	<text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle"
		font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
		font-weight="700" font-size="32" fill="url(#g)" letter-spacing="-1">JV</text>
</svg>
